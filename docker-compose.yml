# VistA on IRIS — orchestration (per docs/vista-iris-container-spec-v2.md §11.2)
# Valid under both `podman compose` (primary) and `docker compose`.
#
#   podman compose up --build -d        # or: docker compose up --build -d
#
# Base image is InterSystems IRIS *for Health* Community (FHIR server retained,
# spec §4); track the LATEST Community release via IRIS_TAG.
# Apple Silicon / arm64: select the arm64 base image without editing this file:
#   IRIS_TAG=latest-cd-arm64 podman compose up --build -d

services:
  vista:
    build:
      context: .
      args:
        IRIS_TAG: ${IRIS_TAG:-latest-cd}
    image: vista-iris:dev
    container_name: vista-iris
    ports:
      - "1972:1972"      # IRIS superserver — RPC / xDBC
      - "52773:52773"    # IRIS Management Portal (web) + FHIR REST
      - "9430:9430"      # VistA RPC Broker (XWB) — CPRS / RPC clients
      - "5026:5026"      # VistA HL7 MLLP listener — HL7 v2 / FHIR-import path
    volumes:
      - vista-durable:/durable
    environment:
      # Durable %SYS: keep instance-specific data on the named volume, outside
      # the image layer, so it survives container recreation. The spec defaults
      # to EPHEMERAL (§4); for a fully disposable instance, drop the volume
      # mount + this var and rebuild from scratch each time.
      ISC_DATA_DIRECTORY: /durable/iris
    # IRIS Community Edition is core-capped (~20). On hosts with more cores,
    # uncomment so the instance can start within the limit:
    # cpuset: "0-19"
    restart: unless-stopped

volumes:
  vista-durable:
