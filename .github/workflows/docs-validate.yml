# Docs corpus validation gate — calls the shared doc-framework reusable workflow.
# Source of truth: vista-cloud-dev/doc-framework/.github/workflows/validate.yml
# Gate = link/anchor integrity (docs/); frontmatter advisory. Local run:
#   python3 ../doc-framework/tools/validate_docs.py docs/
name: docs-validate
on:
  push:
    paths: ["docs/**", ".github/workflows/docs-validate.yml"]
  pull_request:
    paths: ["docs/**"]
jobs:
  validate:
    uses: vista-cloud-dev/doc-framework/.github/workflows/validate.yml@main
    with:
      corpus_path: docs
